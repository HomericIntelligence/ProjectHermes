name: Required Checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: required-${{ github.head_ref || github.sha }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0

      - uses: prefix-dev/setup-pixi@v0.9.5
        with:
          pixi-version: v0.67.2
          cache: true

      - name: Cache pre-commit environments
        uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            pre-commit-${{ runner.os }}-

      - name: Run pre-commit
        run: pixi run pre-commit run --all-files --show-diff-on-failure

      - name: Lint
        run: pixi run lint

      - name: Type check
        run: pixi run typecheck

  markdownlint:
    name: markdownlint
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    needs: lint
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: Run markdownlint-cli2
        uses: DavidAnson/markdownlint-cli2-action@05f32210e84442804257b2a6f20b273450ec8265  # v20.0.0
        with:
          globs: "**/*.md"
          config: ".markdownlint.yaml"

  pixi-check:
    name: pixi-check
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    needs: lint
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: Skip if no pixi.toml
        id: detect
        run: |
          if [ ! -f pixi.toml ]; then
            echo "::notice::No pixi.toml in repo, skipping pixi-check"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Setup pixi
        if: steps.detect.outputs.skip == 'false'
        uses: prefix-dev/setup-pixi@v0.9.5
        with:
          pixi-version: v0.67.2
          cache: true
      - name: pixi install (locked)
        if: steps.detect.outputs.skip == 'false'
        run: |
          if [ -f pixi.lock ]; then
            pixi install --locked
          else
            echo "::warning::pixi.toml present but pixi.lock missing — running unlocked"
            pixi install
          fi

  justfile-check:
    name: justfile-check
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    needs: lint
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: Skip if no justfile
        id: detect
        run: |
          if [ ! -f justfile ] && [ ! -f Justfile ]; then
            echo "::notice::No justfile in repo, skipping justfile-check"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Install just
        if: steps.detect.outputs.skip == 'false'
        uses: extractions/setup-just@dd310ad5a97d8e7b41793f8ef055398d51ad4de6  # v2.0.0
        with:
          just-version: "1.36.0"
      - name: Validate justfile
        if: steps.detect.outputs.skip == 'false'
        run: |
          just --evaluate >/dev/null
          just --list >/dev/null

  symlink-check:
    name: symlink-check
    runs-on: ubuntu-24.04
    timeout-minutes: 3
    needs: lint
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: Run symlink check
        run: bash scripts/check-symlinks.sh

  unit-tests:
    name: unit-tests
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: prefix-dev/setup-pixi@v0.9.5
        with:
          pixi-version: v0.67.2
          cache: true

      - name: Unit tests (no NATS required)
        run: pixi run pytest -m "not integration"

      - name: Per-module coverage minimums
        run: |
          pixi run coverage report --include="src/hermes/__init__.py" --fail-under=70
          pixi run coverage report --include="src/hermes/__main__.py" --fail-under=95
          pixi run coverage report --include="src/hermes/config.py" --fail-under=90
          pixi run coverage report --include="src/hermes/logging_config.py" --fail-under=90
          pixi run coverage report --include="src/hermes/metrics.py" --fail-under=95
          pixi run coverage report --include="src/hermes/middleware.py" --fail-under=80
          pixi run coverage report --include="src/hermes/models.py" --fail-under=90
          pixi run coverage report --include="src/hermes/publisher.py" --fail-under=90
          pixi run coverage report --include="src/hermes/rate_limit.py" --fail-under=95
          pixi run coverage report --include="src/hermes/server.py" --fail-under=90

      - name: Upload coverage report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        if: always()
        with:
          name: coverage-html
          path: |
            htmlcov/
            coverage.xml

  integration-tests:
    name: integration-tests
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: prefix-dev/setup-pixi@v0.9.5
        with:
          pixi-version: v0.67.2
          cache: true

      - name: Start NATS with JetStream
        run: |
          docker run -d --name nats-js -p 4222:4222 -p 8222:8222 nats:2.10@sha256:5498ba57b9471840be3d15b033a4eec554d1c02fa6c2cc0ca2d888637f6c6e2f -js -m 8222
          until curl -sf http://localhost:8222/healthz; do sleep 1; done

      - name: Integration tests
        env:
          TEST_NATS_URL: nats://localhost:4222
        run: pixi run pytest -m integration -v

  security-dependency-scan:
    name: security/dependency-scan
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: prefix-dev/setup-pixi@v0.9.5
        with:
          pixi-version: v0.67.2
          cache: true

      - name: Dependency scan (pip-audit)
        run: |
          pixi run pip-audit >> $GITHUB_STEP_SUMMARY

  security-secrets-scan:
    name: security/secrets-scan
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        run: |
          GITLEAKS_VERSION=8.30.1
          OS=$(uname -s | tr '[:upper:]' '[:lower:]')
          ARCH=$(uname -m | sed 's/x86_64/x64/;s/aarch64/arm64/')
          curl -sSfL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_${OS}_${ARCH}.tar.gz" \
            | tar -xz -C /usr/local/bin gitleaks
          gitleaks version

      - name: Run Gitleaks
        run: |
          if [ -f .gitleaks.toml ]; then
            gitleaks detect --source . --config .gitleaks.toml \
              --report-format sarif --report-path gitleaks.sarif --exit-code 1
          else
            gitleaks detect --source . \
              --report-format sarif --report-path gitleaks.sarif --exit-code 1
          fi

      - name: Upload Gitleaks SARIF
        if: always() && hashFiles('gitleaks.sarif') != ''
        uses: actions/upload-artifact@v7
        with:
          name: gitleaks-report
          path: gitleaks.sarif
          retention-days: 90

  build:
    name: build
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: prefix-dev/setup-pixi@v0.9.5
        with:
          pixi-version: v0.67.2
          cache: true

      - name: Install build tools
        run: pixi run pip install build hatchling

      - name: Build wheel
        run: pixi run python -m build --no-isolation

  schema-validation:
    name: schema-validation
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Install check-jsonschema
        run: pip install check-jsonschema

      - name: Validate workflow YAML schemas
        run: |
          find .github/workflows -name "*.yml" | \
            xargs check-jsonschema \
              --schemafile https://json.schemastore.org/github-workflow

  deps-version-sync:
    name: deps/version-sync
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Check pyproject.toml version
        run: |
          python3 -c "
          import tomllib
          d = tomllib.load(open('pyproject.toml', 'rb'))
          v = d['project']['version']
          print(f'pyproject.toml version: {v}')
          "

      - name: Check version consistency (pyproject.toml vs pixi.toml)
        run: |
          set -e
          PYPROJECT_VERSION=$(grep '^version = ' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          PIXI_VERSION=$(grep '^version = ' pixi.toml | sed 's/version = "\(.*\)"/\1/')

          if [ "$PYPROJECT_VERSION" != "$PIXI_VERSION" ]; then
            echo "Version mismatch: pyproject.toml ($PYPROJECT_VERSION) != pixi.toml ($PIXI_VERSION)"
            exit 1
          fi

          echo "Version check passed: $PYPROJECT_VERSION"

      - name: Check pixi.lock is not modified (uncommitted)
        run: |
          if git diff --name-only HEAD | grep -q pixi.lock; then
            echo "WARN: pixi.lock has uncommitted modifications"
            exit 1
          else
            echo "OK: pixi.lock is clean"
          fi
