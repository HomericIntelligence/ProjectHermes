# SPDX-License-Identifier: MIT
# Weekly scheduled run of scripts/discover-tech-debt.sh — posts the summary as
# a comment on Epic #544 only when newly introduced debt markers are found,
# so maintainers are notified without relying on manual runs.
# See HomericIntelligence/ProjectHermes#549.

name: tech-debt-discovery

on:
  schedule:
    # Mondays 14:00 UTC
    - cron: "0 14 * * 1"
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Run tech-debt discovery
        id: scan
        run: |
          set -uo pipefail
          chmod +x scripts/discover-tech-debt.sh
          set +e
          OUTPUT="$(scripts/discover-tech-debt.sh)"
          rc=$?
          set -e
          {
            echo 'OUTPUT<<HEREDOC_EOF'
            printf '%s\n' "$OUTPUT"
            echo 'HEREDOC_EOF'
          } >>"$GITHUB_OUTPUT"
          if [ "$rc" -eq 1 ]; then
            echo "found=true" >>"$GITHUB_OUTPUT"
          else
            echo "found=false" >>"$GITHUB_OUTPUT"
          fi

      - name: Post summary comment to Epic #544
        if: steps.scan.outputs.found == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SCAN_OUTPUT: ${{ steps.scan.outputs.OUTPUT }}
        run: |
          set -euo pipefail
          {
            echo "## Tech-debt discovery — $(date -u +%Y-%m-%d)"
            echo ""
            echo '```'
            printf '%s\n' "$SCAN_OUTPUT"
            echo '```'
          } > /tmp/comment.md
          gh issue comment 544 --repo "$GITHUB_REPOSITORY" --body-file /tmp/comment.md
