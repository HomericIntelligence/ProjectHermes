name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.sha }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pixi
        uses: prefix-dev/setup-pixi@v0.8.1
        with:
          pixi-version: latest
          cache: true

      - name: Check version consistency
        run: |
          set -e
          PYPROJECT_VERSION=$(grep '^version = ' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          PIXI_VERSION=$(grep '^version = ' pixi.toml | sed 's/version = "\(.*\)"/\1/')

          if [ "$PYPROJECT_VERSION" != "$PIXI_VERSION" ]; then
            echo "Version mismatch: pyproject.toml ($PYPROJECT_VERSION) != pixi.toml ($PIXI_VERSION)"
            exit 1
          fi

          echo "Version check passed: $PYPROJECT_VERSION"

      - name: Run pre-commit
        run: pixi run pre-commit run --all-files

      - name: Lint
        run: pixi run lint

      - name: Type check
        run: pixi run typecheck

      - name: Dependency scan (pip-audit)
        run: pixi run pip-audit >> $GITHUB_STEP_SUMMARY
        continue-on-error: true

      - name: Unit tests (no NATS required)
        run: pixi run pytest -m "not integration" --cov-fail-under=80

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-html
          path: htmlcov/

  integration-test:
    name: Integration Tests (NATS)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pixi
        uses: prefix-dev/setup-pixi@v0.8.1
        with:
          pixi-version: latest
          cache: true

      - name: Start NATS with JetStream
        run: |
          docker run -d --name nats-js -p 4222:4222 nats:latest -js
          sleep 2

      - name: Integration tests
        env:
          TEST_NATS_URL: nats://localhost:4222
        run: pixi run pytest -m integration -v
