name: Security Scan

on:
  pull_request:
    branches: [main]
  schedule:
    # Weekly on Monday at 08:00 UTC
    - cron: "0 8 * * 1"
  workflow_dispatch:

# Single source of truth — bump this together with GITLEAKS_VERSION in
# .github/workflows/_required.yml so PR scans and required CI agree.
env:
  GITLEAKS_VERSION: "8.30.1"

jobs:
  secret-scan:
    name: Secret Scanning (gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout (full history)
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          curl -sSfL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks

      - name: Scan for secrets
        run: gitleaks detect --source . --config .gitleaks.toml --verbose --exit-code=1
