services:
  nats:
    # pinned — bump digest monthly or when CVE scan fires
    image: nats:2.14@sha256:7ff2e641c33dbdb0dd13a943ba0b70d841b71275c607baa53ef9b8661f0b2d8c
    command: ["--jetstream", "--store_dir", "/data"]
    ports:
      - "4222:4222"
    volumes:
      - nats-data:/data
    healthcheck:
      test: ["CMD", "nats-server", "--help"]
      interval: 10s
      timeout: 5s
      retries: 3
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "${HERMES_CPU_LIMIT:-0.50}"
          memory: "${HERMES_MEMORY_LIMIT:-256M}"
        reservations:
          cpus: "${HERMES_CPU_RESERVATION:-0.10}"
          memory: "${HERMES_MEMORY_RESERVATION:-64M}"

  hermes:
    build: .
    ports:
      - "${HERMES_PORT:-8085}:8085"
    environment:
      - NATS_URL=nats://nats:4222
      - HERMES_PORT=8085
      - WEBHOOK_SECRET=${WEBHOOK_SECRET:-}
    depends_on:
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8085/ready"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    read_only: true
    tmpfs:
      - /tmp
      # Defense-in-depth: if PYTHONDONTWRITEBYTECODE is overridden at runtime,
      # Python would otherwise fail to write .pyc files under the read-only FS.
      - /app/__pycache__
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "${HERMES_CPU_LIMIT:-0.50}"
          memory: "${HERMES_MEMORY_LIMIT:-256M}"
        reservations:
          cpus: "${HERMES_CPU_RESERVATION:-0.10}"
          memory: "${HERMES_MEMORY_RESERVATION:-64M}"

volumes:
  nats-data:
