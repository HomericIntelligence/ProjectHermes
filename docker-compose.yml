services:
  nats:
    # pinned — bump digest monthly or when CVE scan fires
    image: nats:2.14@sha256:79b36c2da1e54fb5d2c563dcb6da10b4a12cc18e13441782689579f130e1a9e4
    command: ["--jetstream", "--store_dir", "/data"]
    ports:
      - "4222:4222"
    volumes:
      - nats-data:/data
    healthcheck:
      test: ["CMD", "nats-server", "--help"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M
        reservations:
          cpus: "0.10"
          memory: 64M

  hermes:
    build: .
    ports:
      - "${HERMES_PORT:-8085}:8085"
    environment:
      - NATS_URL=nats://nats:4222
      - HERMES_PORT=8085
      - WEBHOOK_SECRET=${WEBHOOK_SECRET:-}
    depends_on:
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8085/ready"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M
        reservations:
          cpus: "0.10"
          memory: 64M

volumes:
  nats-data:
