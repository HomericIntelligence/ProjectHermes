default_install_hook_types: [pre-commit, pre-push]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: end-of-file-fixer
      - id: trailing-whitespace

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.15.0
    hooks:
      - id: mypy
        additional_dependencies:
          - pydantic>=2.0
          - pydantic-settings

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks

  - repo: local
    hooks:
      - id: no-gitleaks-exit-code-0
        name: Gitleaks must not use --exit-code 0
        language: pygrep
        entry: 'gitleaks detect.*--exit-code[= ]0'
        files: \.github/workflows/.*\.yml$

      - id: forbid-or-true
        name: "forbid silent-failure workaround in shell/YAML/Dockerfile/justfile/HCL"
        description: >
          Rejects the `or-true` idiom (and its whitespace variants) in shell,
          YAML, Dockerfile, justfile, and HCL sources. Refactor to an explicit
          `if`-guard, a real conditional, or a documented `set +e`/`set -e`
          bracket. Ports the regression guard from HomericIntelligence/Odysseus#280.
        language: pygrep
        entry: '\|\|\s*true(\s*$|\s+#)'
        files: \.(sh|bash|yml|yaml|hcl)$|(^|/)Dockerfile[^/]*$|(^|/)[Jj]ustfile$
        types: [text]
        pass_filenames: true

      - id: forbid-continue-on-error
        name: "forbid continue-on-error workflow opt-out"
        description: >
          GitHub Actions `continue-on-error true` (truthy form) hides real CI
          failures. Fix the underlying job/step instead. Ports the regression
          guard from HomericIntelligence/Odysseus#280.
        language: pygrep
        entry: '^\s*continue-on-error:\s*true\s*$'
        files: ^\.github/workflows/.*\.ya?ml$
        pass_filenames: true

      - id: docker-compose-config
        name: "docker compose config (validate compose schema)"
        description: >
          Mirrors CI's `docker compose config --quiet` check so malformed
          compose files fail at commit time, not on push (#538).
        language: system
        entry: bash -c 'docker compose config --quiet'
        files: ^docker-compose\.ya?ml$
        pass_filenames: false

      - id: no-latest-image-tags
        name: "forbid :latest image tags in ops manifests"
        description: >
          Regression guard for #316/#566. Floating `:latest` tags (and
          `uses: ...@latest` action refs) break reproducibility. Pin to an
          explicit version (and digest where supported).
        language: system
        entry: bash scripts/check-no-latest-tags.sh
        pass_filenames: false
        # Run once per commit; the script scans the tracked file set itself.
        always_run: true

      - id: no-bare-crypto-in-tests
        name: "forbid bare hmac/hashlib imports in tests/ (issue #468)"
        description: >
          Regression guard for #468 (follow-up from #329). All test files
          must use `sign_body` / `TEST_SECRET` from `tests/helpers.py`
          instead of re-implementing HMAC signing inline. The only file
          allowed to import `hmac` or `hashlib` is `tests/helpers.py`.
        language: system
        entry: python3 scripts/check-no-bare-crypto-in-tests.py
        pass_filenames: false
        always_run: true

      - id: require-signed-commits
        name: "require gpg/ssh-signed commits on push"
        description: >
          Verify every commit being pushed is GPG/SSH signed. Runs at pre-push
          stage so it catches the full range of new commits in one pass. Use
          `git push --no-verify` to bypass intentionally. To fix: re-sign with
          `git rebase --exec 'git commit --amend --no-edit -S' <base>`.
        language: system
        entry: |
          bash -c '
            set -e
            # pre-commit pre-push hook passes refs on stdin as: <local_ref> <local_sha> <remote_ref> <remote_sha>
            # If invoked without stdin (e.g. via "pre-commit run --hook-stage pre-push" manually),
            # fall back to verifying every commit since merge-base with origin/HEAD.
            range=""
            if read -r local_ref local_sha remote_ref remote_sha; then
              if [ "$local_sha" = "0000000000000000000000000000000000000000" ]; then
                exit 0  # deleting a remote ref; nothing to verify
              fi
              if [ "$remote_sha" = "0000000000000000000000000000000000000000" ]; then
                # New branch on remote — verify everything new on this branch since merge-base with default
                default=$(git symbolic-ref refs/remotes/origin/HEAD 2>/dev/null | sed "s|refs/remotes/||" || echo origin/main)
                base=$(git merge-base "$local_sha" "$default" 2>/dev/null || git rev-list --max-parents=0 "$local_sha" | tail -1)
                range="$base..$local_sha"
              else
                range="$remote_sha..$local_sha"
              fi
            else
              # Manual invocation — check unpushed commits on current branch
              upstream=$(git rev-parse --abbrev-ref --symbolic-full-name "@{u}" 2>/dev/null || true)
              if [ -n "$upstream" ]; then
                range="$upstream..HEAD"
              else
                default=$(git symbolic-ref refs/remotes/origin/HEAD 2>/dev/null | sed "s|refs/remotes/||" || echo origin/main)
                base=$(git merge-base HEAD "$default" 2>/dev/null || git rev-list --max-parents=0 HEAD | tail -1)
                range="$base..HEAD"
              fi
            fi
            commits=$(git rev-list "$range")
            if [ -z "$commits" ]; then
              exit 0
            fi
            failed=""
            for sha in $commits; do
              # %G? prints: G (good), B (bad), U (good but unknown trust), X (good but expired key),
              # Y (good signed by expired key), R (good but revoked), E (cannot check), N (no signature)
              status=$(git log -1 --format="%G?" "$sha")
              case "$status" in
                G|U) ;;
                *)   failed="$failed $sha($status)" ;;
              esac
            done
            if [ -n "$failed" ]; then
              echo "ERROR: unsigned or invalid-signature commits in push range:" >&2
              echo "$failed" | tr " " "\n" | sed "/^$/d; s/^/  /" >&2
              echo "" >&2
              echo "Fix by re-signing the range:" >&2
              echo "  git rebase --exec '"'"'git commit --amend --no-edit -S --no-verify'"'"' $(echo "$range" | cut -d. -f1)" >&2
              echo "  git push --force-with-lease" >&2
              echo "" >&2
              echo "Or, if you intentionally need to bypass (e.g. CI fixup), use:" >&2
              echo "  git push --no-verify" >&2
              exit 1
            fi
            exit 0
          '
        always_run: true
        pass_filenames: false
        stages: [pre-push]
