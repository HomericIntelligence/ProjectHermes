[workspace]
name = "project-hermes"
version = "0.1.0"
description = "Bridges external webhooks to NATS JetStream for pub/sub fan-out and event replay"
channels = ["conda-forge"]
platforms = ["linux-64", "osx-arm64", "osx-64"]

[dependencies]
python = ">=3.10"
just = ">=1.13"

[pypi-dependencies]
hermes = { path = ".", editable = true }
fastapi = ">=0.115,<1"
uvicorn = {version = ">=0.46.0,<1", extras = ["standard"]}
nats-py = ">=2.9,<3"
pydantic = ">=2.0,<3"
pydantic-settings = ">=2.0,<3"
httpx = ">=0.27,<1"
slowapi = ">=0.1.9,<1"
limits = ">=5.8.0,<6"
prometheus-client = ">=0.20,<1"
# Pin urllib3>=2.7.0 to remediate CVE-2026-44431 and CVE-2026-44432 (transitive
# via cachecontrol/requests on linux-64 — osx variants already resolve to 2.7.0).
urllib3 = ">=2.7.0,<3"

[feature.dev.pypi-dependencies]
pytest = ">=9.0,<10"
pytest-asyncio = ">=1.0,<2"
pytest-cov = ">=5.0,<7"
ruff = ">=0.11,<1"
mypy = ">=1.10,<2"
pip-audit = ">=2.7,<3"
pip = ">=26.1,<27"
pre-commit = ">=3.0,<5"

[environments]
default = { features = ["dev"], solve-group = "default" }

[tasks]
start     = "just start"
test      = "just test"
lint      = "just lint"
typecheck = "just typecheck"
pip-audit = "pip-audit"
