[workspace]
name = "project-hermes"
version = "0.1.0"
description = "Bridges external webhooks to NATS JetStream for pub/sub fan-out and event replay"
channels = ["conda-forge"]
platforms = ["linux-64", "osx-arm64", "osx-64"]

[dependencies]
python = ">=3.10"
just = ">=1.13"

[pypi-dependencies]
hermes = { path = ".", editable = true }
fastapi = ">=0.136.1,<1"
# Pin starlette>=1.0.1 — starlette 1.0.0 had a BaseHTTPMiddleware regression
# that raised `RuntimeError: Response content longer than Content-Length` when
# streaming-response wrapper re-emitted a body with Content-Length already set.
# Fixed in 1.0.1. See readonly-fs-smoke failure on main, GH run 25840464800.
# Further bumped to >=1.3.1 to remediate PYSEC-2026-248 (fix 1.3.0) and
# PYSEC-2026-249 (fix 1.3.1), flagged by pip-audit / security/dependency-scan.
# Keep in sync with pyproject.toml.
starlette = ">=1.3.1,<2"
uvicorn = {version = ">=0.47.0,<1", extras = ["standard"]}
nats-py = ">=2.14.0,<3"
pydantic = ">=2.13.4,<3"
# Bumped to >=2.14.2 to remediate GHSA-4xgf-cpjx-pc3j (pip-audit).
pydantic-settings = ">=2.14.2,<3"
httpx = ">=0.28.1,<1"
slowapi = ">=0.1.9,<1"
limits = ">=5.8.0,<6"
prometheus-client = ">=0.20,<1"
# Pin urllib3>=2.7.0 to remediate CVE-2026-44431 and CVE-2026-44432 (transitive
# via cachecontrol/requests on linux-64 — osx variants already resolve to 2.7.0).
urllib3 = ">=2.7.0,<3"
# Pin msgpack>=1.2.1 to remediate GHSA-6v7p-g79w-8964 (transitive via cachecontrol,
# same chain as urllib3 above). Flagged by security/dependency-scan.
msgpack = ">=1.2.1,<2"

[feature.dev.pypi-dependencies]
pytest = ">=9.0,<10"
pytest-asyncio = ">=1.0,<2"
pytest-cov = ">=5.0,<7"
ruff = ">=0.11,<1"
mypy = ">=1.10,<2"
pip-audit = ">=2.7,<3"
pip = ">=26.1,<27"
pre-commit = ">=3.0,<5"
pyyaml = ">=6.0,<7"

[feature.lock.dependencies]
# Python 3.12 to match the Dockerfile base image (python:3.12-slim).
# Refreshing the lock against any other interpreter will produce wheels that
# the Docker builder cannot install. See issue #354.
python = ">=3.12,<3.13"

[feature.lock.pypi-dependencies]
# Pin pip-tools to a single minor so the regenerated lock file is byte-stable
# across contributors. Bump in lockstep with pip in pyproject.toml.
pip-tools = ">=7.4,<8"

[environments]
default = { features = ["dev"], solve-group = "default" }
lock    = { features = ["lock"], no-default-feature = true }

[tasks]
start     = "just start"
test      = "just test"
lint      = "just lint"
typecheck = "just typecheck"
pip-audit = "pip-audit"
