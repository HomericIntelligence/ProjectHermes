[workspace]
name = "project-hermes"
version = "0.1.0"
description = "Bridges external webhooks to NATS JetStream for pub/sub fan-out and event replay"
channels = ["conda-forge"]
platforms = ["linux-64"]

[dependencies]
python = ">=3.10"
just = ">=1.13"

[pypi-dependencies]
fastapi = ">=0.115,<1"
uvicorn = {version = ">=0.30,<1", extras = ["standard"]}
nats-py = ">=2.9,<3"
pydantic = ">=2.0,<3"
pydantic-settings = ">=2.0,<3"
httpx = ">=0.27,<1"
slowapi = ">=0.1,<1"
limits = ">=3.0,<4"
prometheus-client = ">=0.20,<1"

[feature.dev.pypi-dependencies]
pytest = ">=9.0,<10"
pytest-asyncio = ">=1.0,<2"
pytest-cov = ">=5.0,<7"
httpx = ">=0.27,<1"
ruff = ">=0.11,<1"
mypy = ">=1.10,<2"

[environments]
default = { features = ["dev"], solve-group = "default" }

[tasks]
start     = "just start"
test      = "just test"
lint      = "just lint"
typecheck = "just typecheck"
