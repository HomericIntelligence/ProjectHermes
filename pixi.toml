[workspace]
name = "project-hermes"
version = "0.1.0"
description = "Bridges external webhooks to NATS JetStream for pub/sub fan-out and event replay"
channels = ["conda-forge"]
platforms = ["linux-64", "osx-arm64", "osx-64"]

[dependencies]
python = ">=3.10"
just = ">=1.13"

[pypi-dependencies]
hermes = { path = ".", editable = true }
fastapi = ">=0.136.1,<1"
# Pin starlette<1.0 — starlette 1.0.0 has a BaseHTTPMiddleware regression that
# raises `RuntimeError: Response content longer than Content-Length` when the
# streaming-response wrapper re-emits a body that already has Content-Length set
# by an inner handler (e.g. HTTPException → JSONResponse for /webhook 401). See
# readonly-fs-smoke failure on main, GH run 25840464800. Keep in sync with
# pyproject.toml; drop once starlette ships a fix.
starlette = ">=1.0.1,<2"
uvicorn = {version = ">=0.47.0,<1", extras = ["standard"]}
nats-py = ">=2.9,<3"
pydantic = ">=2.13.4,<3"
pydantic-settings = ">=2.14.1,<3"
httpx = ">=0.28.1,<1"
slowapi = ">=0.1.9,<1"
limits = ">=5.8.0,<6"
prometheus-client = ">=0.20,<1"
# Pin urllib3>=2.7.0 to remediate CVE-2026-44431 and CVE-2026-44432 (transitive
# via cachecontrol/requests on linux-64 — osx variants already resolve to 2.7.0).
urllib3 = ">=2.7.0,<3"
# Pin idna>=3.15 to remediate CVE-2026-45409 (DoS via long IDNA inputs).
idna = ">=3.15,<4"

[feature.dev.pypi-dependencies]
pytest = ">=9.0,<10"
pytest-asyncio = ">=1.0,<2"
pytest-cov = ">=5.0,<7"
ruff = ">=0.11,<1"
mypy = ">=1.10,<2"
pip-audit = ">=2.7,<3"
pip = ">=26.1,<27"
pre-commit = ">=3.0,<5"

[environments]
default = { features = ["dev"], solve-group = "default" }

[tasks]
start     = "just start"
test      = "just test"
lint      = "just lint"
typecheck = "just typecheck"
pip-audit = "pip-audit"
